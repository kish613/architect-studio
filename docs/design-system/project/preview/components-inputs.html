<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><link rel="stylesheet" href="../colors_and_type.css"></head><body>
<div class="label-row"><span class="eyebrow">Form · Input & field</span><span class="eyebrow" style="font-family:var(--font-mono);letter-spacing:0">default · focus · error</span></div>
<div style="display:flex;flex-direction:column;gap:10px">
  <label style="display:flex;flex-direction:column;gap:6px">
    <span style="font-family:var(--font-ui);font-size:12px;font-weight:500;color:var(--fg-2)">Project name</span>
    <input value="Extension — 14 Oak Lane" style="background:#111;border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:9px 12px;color:var(--fg-1);font-family:var(--font-sans);font-size:14px;outline:none"/>
  </label>
  <label style="display:flex;flex-direction:column;gap:6px">
    <span style="font-family:var(--font-ui);font-size:12px;font-weight:500;color:var(--fg-2)">Postcode <span style="color:var(--fg-3)">— for planning search</span></span>
    <input value="SW1A 1AA" style="background:#111;border:1px solid #F97316;border-radius:8px;padding:9px 12px;color:var(--fg-1);font-family:var(--font-sans);font-size:14px;outline:none;box-shadow:0 0 0 3px rgba(249,115,22,.15)"/>
  </label>
  <label style="display:flex;flex-direction:column;gap:6px">
    <span style="font-family:var(--font-ui);font-size:12px;font-weight:500;color:#F87171">Email</span>
    <input value="not-an-email" style="background:#111;border:1px solid #DC2626;border-radius:8px;padding:9px 12px;color:var(--fg-1);font-family:var(--font-sans);font-size:14px;outline:none"/>
    <span style="font-family:var(--font-ui);font-size:11px;color:#F87171">Enter a valid email address.</span>
  </label>
</div>
</body></html>
