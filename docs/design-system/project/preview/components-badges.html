<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><link rel="stylesheet" href="../colors_and_type.css"></head><body>
<div class="label-row"><span class="eyebrow">Badges · Status & tags</span><span class="eyebrow" style="font-family:var(--font-mono);letter-spacing:0">default · secondary · outline · destructive · shimmer</span></div>
<div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center">
  <span style="background:#F97316;color:#fff;border-radius:6px;padding:3px 10px;font-family:var(--font-ui);font-size:12px;font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,.3)">Primary</span>
  <span style="background:#1a1a1a;color:rgba(255,255,255,.9);border-radius:6px;padding:3px 10px;font-family:var(--font-ui);font-size:12px;font-weight:600">Secondary</span>
  <span style="border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.9);border-radius:6px;padding:3px 10px;font-family:var(--font-ui);font-size:12px;font-weight:600">Outline</span>
  <span style="background:#DC2626;color:#fff;border-radius:6px;padding:3px 10px;font-family:var(--font-ui);font-size:12px;font-weight:600">Destructive</span>
  <span style="background:rgba(16,185,129,.12);color:#6EE7B7;border:1px solid rgba(16,185,129,.3);border-radius:6px;padding:3px 10px;font-family:var(--font-ui);font-size:12px;font-weight:600">Success</span>
</div>
<div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:14px">
  <span style="padding:4px 12px;border-radius:9999px;background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.2);color:#F97316;font-family:var(--font-ui);font-size:12px;font-weight:500;background-image:linear-gradient(90deg,transparent 0%,rgba(249,115,22,.15) 50%,transparent 100%);background-size:200% 100%;animation:shimmer 3s linear infinite">Beta</span>
  <span style="padding:4px 10px;border-radius:9999px;background:rgba(0,174,239,.1);border:1px solid rgba(0,174,239,.25);color:#00AEEF;font-family:var(--font-ui);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em">Planning</span>
  <span style="padding:4px 10px;border-radius:9999px;background:#0F0F0F;border:1px solid rgba(255,255,255,.1);color:var(--fg-2);font-family:var(--font-mono);font-size:11px">v2 · BIM-first</span>
</div>
<style>@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}</style>
</body></html>
