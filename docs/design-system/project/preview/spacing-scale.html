<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><link rel="stylesheet" href="../colors_and_type.css"></head><body>
<div class="label-row"><span class="eyebrow">Spacing scale</span><span class="eyebrow" style="font-family:var(--font-mono);letter-spacing:0">--s-1 → --s-24</span></div>
<div style="display:flex;flex-direction:column;gap:6px">
<script>
const sp=[['1',4],['2',8],['3',12],['4',16],['5',20],['6',24],['8',32],['10',40],['12',48],['16',64]];
document.scripts[0].insertAdjacentHTML('afterend', sp.map(([n,v])=>`
  <div style="display:flex;align-items:center;gap:12px">
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3);width:56px">s-${n}</div>
    <div style="height:8px;width:${v*2}px;background:#F97316;border-radius:2px"></div>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--fg-2)">${v}px</div>
  </div>`).join(''));
</script>
</div>
</body></html>
