  <g stroke="#003087" stroke-width="1.5" fill="none" stroke-linecap="square" stroke-linejoin="miter">
    <g stroke-width="1.5">
      <line x1="60" y1="15" x2="85" y2="15"></line>
      <line x1="60" y1="20" x2="85" y2="20"></line>
      <line x1="60" y1="25" x2="85" y2="25"></line>
