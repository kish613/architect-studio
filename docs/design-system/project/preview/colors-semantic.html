<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="label-row"><span class="eyebrow">Semantic</span><span class="eyebrow" style="font-family:var(--font-mono);letter-spacing:0">success / warning / danger</span></div>
<div class="row">
  <div class="swatch" style="background:#10B981"><div class="name">Success</div><div class="hex">#10B981</div></div>
  <div class="swatch" style="background:#F59E0B"><div class="name">Warning</div><div class="hex">#F59E0B</div></div>
  <div class="swatch" style="background:#DC2626"><div class="name">Danger</div><div class="hex">#DC2626</div></div>
  <div class="swatch" style="background:hsl(0 62.8% 30.6%)"><div class="name">Destructive bg</div><div class="hex">hsl 0 62 30</div></div>
</div>
<div class="label-row" style="margin-top:14px"><span class="eyebrow">Chart scale</span></div>
<div class="row">
  <div class="swatch" style="background:hsl(220 70% 50%);aspect-ratio:2"><div class="name">1</div></div>
  <div class="swatch" style="background:hsl(160 60% 45%);aspect-ratio:2"><div class="name">2</div></div>
  <div class="swatch" style="background:hsl(30 80% 55%);aspect-ratio:2"><div class="name">3</div></div>
  <div class="swatch" style="background:hsl(280 65% 60%);aspect-ratio:2"><div class="name">4</div></div>
  <div class="swatch" style="background:hsl(340 75% 55%);aspect-ratio:2"><div class="name">5</div></div>
</div>
</body></html>
