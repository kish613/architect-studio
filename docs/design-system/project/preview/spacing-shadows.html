<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><link rel="stylesheet" href="../colors_and_type.css"></head><body>
<div class="label-row"><span class="eyebrow">Elevation · Shadows & glass</span><span class="eyebrow" style="font-family:var(--font-mono);letter-spacing:0">xs · sm · md · glass · brand</span></div>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px">
  <div style="height:78px;background:#161616;border:1px solid var(--line-2);border-radius:12px;box-shadow:var(--shadow-xs);display:flex;align-items:flex-end;padding:10px;font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">shadow-xs</div>
  <div style="height:78px;background:#161616;border:1px solid var(--line-2);border-radius:12px;box-shadow:var(--shadow-sm);display:flex;align-items:flex-end;padding:10px;font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">shadow-sm</div>
  <div style="height:78px;background:#161616;border:1px solid var(--line-2);border-radius:12px;box-shadow:var(--shadow-md);display:flex;align-items:flex-end;padding:10px;font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">shadow-md</div>
  <div style="height:78px;backdrop-filter:blur(20px);background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;box-shadow:var(--shadow-glass-dark);display:flex;align-items:flex-end;padding:10px;font-family:var(--font-mono);font-size:10px;color:var(--fg-2)">dark-glass-card</div>
  <div style="height:78px;background:#F97316;border-radius:12px;box-shadow:var(--shadow-brand);display:flex;align-items:flex-end;padding:10px;font-family:var(--font-mono);font-size:10px;color:rgba(255,255,255,.9)">shadow-brand</div>
  <div style="height:78px;background:#0F0F0F;border:1px solid rgba(255,255,255,.08);border-radius:12px;box-shadow:0 25px 50px -12px rgba(0,0,0,.45);display:flex;align-items:flex-end;padding:10px;font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">shadow-lg</div>
</div>
</body></html>
