<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="label-row"><span class="eyebrow">Blueprint · Logo & Hero only</span><span class="eyebrow" style="font-family:var(--font-mono);letter-spacing:0">--bp-*</span></div>
<div class="row">
  <div class="swatch" style="background:#003087;aspect-ratio:1.4"><div class="name">Navy</div><div class="hex">#003087</div></div>

  <div class="swatch" style="background:#00AEEF;aspect-ratio:1.4"><div class="name">Cyan</div><div class="hex">#00AEEF</div></div>
  <div class="swatch" style="background:#0891B2;aspect-ratio:1.4"><div class="name">Cyan‑600 (CTA hover)</div><div class="hex">#0891B2</div></div>
</div>
<p style="font-family:var(--font-sans);font-size:12px;color:var(--fg-3);margin:14px 0 0;line-height:1.5">Used in the animated logo and in hero headline gradient spans. Do <em>not</em> use blueprint blues as in‑product UI accents — that remains orange‑only.</p>
