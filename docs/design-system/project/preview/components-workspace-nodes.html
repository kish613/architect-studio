<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><link rel="stylesheet" href="../colors_and_type.css"></head><body>
<div class="label-row"><span class="eyebrow">Workspace nodes · BIM viewer</span><span class="eyebrow" style="font-family:var(--font-mono);letter-spacing:0">weavy-node · default · hover · active</span></div>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
  <div style="background:#1a1a1a;border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:6px">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.7)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    <div style="font-family:var(--font-ui);font-size:12px;font-weight:500;color:var(--fg-1)">Extract</div>
    <div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">default</div>
  </div>
  <div style="background:#222;border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:6px">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.9)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
    <div style="font-family:var(--font-ui);font-size:12px;font-weight:500;color:var(--fg-1)">BIM edit</div>
    <div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">hover</div>
  </div>
  <div style="background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.5);border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:6px">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#F97316" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="1 6 1 19 8 16 16 19 23 16 23 3 16 6 8 3 1 6"/></svg>
    <div style="font-family:var(--font-ui);font-size:12px;font-weight:500;color:#F97316">Present</div>
    <div style="font-family:var(--font-mono);font-size:10px;color:rgba(249,115,22,.7)">active</div>
  </div>
</div>
</body></html>
