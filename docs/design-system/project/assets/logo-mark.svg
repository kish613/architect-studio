    </g>
    <line x1="10" y1="70" x2="45" y2="70" stroke-width="1"></line>
    <path d="M45,40 Q55,40 55,30" stroke-width="1.5" stroke-dasharray="2,2"></path>
    <line x1="90" y1="50" x2="90" y2="80" stroke="#00AEEF" stroke-width="4"></line>
