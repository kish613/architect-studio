<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="label-row"><span class="eyebrow">Type · Font families</span><span class="eyebrow" style="font-family:var(--font-mono);letter-spacing:0">5 families, strict roles</span></div>
<div style="display:flex;flex-direction:column;gap:14px">
  <div style="display:flex;align-items:baseline;justify-content:space-between;border-bottom:1px solid var(--line-1);padding-bottom:10px">
    <div style="font-family:'Space Grotesk',sans-serif;font-size:30px;font-weight:700;letter-spacing:-.02em;color:var(--fg-1)">Space Grotesk</div>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">--font-display · headings</div>
  </div>
  <div style="display:flex;align-items:baseline;justify-content:space-between;border-bottom:1px solid var(--line-1);padding-bottom:10px">
    <div style="font-family:'Poppins',sans-serif;font-size:28px;font-weight:600;color:var(--fg-1)">Poppins</div>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">--font-ui · marketing body, CTAs</div>
  </div>
  <div style="display:flex;align-items:baseline;justify-content:space-between;border-bottom:1px solid var(--line-1);padding-bottom:10px">
    <div style="font-family:'Inter',sans-serif;font-size:26px;font-weight:500;color:var(--fg-1)">Inter</div>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">--font-sans · default body</div>
  </div>
  <div style="display:flex;align-items:baseline;justify-content:space-between;border-bottom:1px solid var(--line-1);padding-bottom:10px">
    <div style="font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:500;color:var(--fg-1)">JetBrains Mono</div>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">--font-mono · coords, code</div>
  </div>
  <div style="display:flex;align-items:baseline;justify-content:space-between">
    <div style="font-family:'Montserrat',sans-serif;font-size:26px;font-weight:700;letter-spacing:-1px;color:var(--fg-1)"><span style="color:#fff">Architect</span> <span style="font-weight:400;color:#00AEEF">Studio</span></div>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">--font-brand · wordmark only</div>
  </div>
</div>
</body></html>
