<!doctype html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8">
<title>Architect Studio — Marketing (Print)</title>
<link rel="stylesheet" href="styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  /* ---------- Print setup ---------- */
  @page { size: A4 landscape; margin: 0.5cm; }

  /* Force dark backgrounds/gradients to print */
  html, body, * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

  /* Kill hero animations so tiles + overlay are in final position for capture */
  .as-hero-row-0, .as-hero-row-1, .as-hero-row-2 { animation: none !important; transform: none !important; margin-left: 0 !important; }
  .as-stat-card { animation: none !important; }

  /* Tidy print layout — each section on its own page, edge to edge */
  @media print {
    body { background: #0A0A0A !important; }
    .as-page { max-width: none; padding: 24px 32px; }

    .as-nav { break-inside: avoid; break-after: page; padding-top: 8px; }
    .as-hero-frame { break-inside: avoid; break-after: page; height: 620px; }
    .as-stats { break-inside: avoid; break-after: page; margin-top: 16px; }
    .as-featured { break-inside: avoid; break-after: page; margin: 24px 0; }
    .as-footer { break-inside: avoid; margin-top: 0; }

    /* Project cards shouldn't split */
    .as-project-card, .as-stat-card { break-inside: avoid; }

    /* Make sure fixed/sticky elements print normally */
    * { animation-duration: 0s !important; transition: none !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="LandingNav.jsx"></script>
<script type="text/babel" src="HeroFrame.jsx"></script>
<script type="text/babel" src="StatsStrip.jsx"></script>
<script type="text/babel" src="FeatureGrid.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel">
function App() {
  React.useEffect(() => { setTimeout(()=>lucide.createIcons(), 50); });
  return (
    <>
      <div className="as-page">
        <LandingNav/>
        <HeroFrame/>
        <StatsStrip/>
        <FeatureGrid/>
      </div>
      <Footer/>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

// Auto-print once fonts + Babel-transpiled JSX + Lucide are ready
(async () => {
  try { await document.fonts.ready; } catch (e) {}
  // Wait for Footer to exist — it's the last JSX script
  for (let i = 0; i < 40; i++) {
    if (typeof Footer !== 'undefined' && document.querySelector('.as-footer')) break;
    await new Promise(r => setTimeout(r, 100));
  }
  await new Promise(r => setTimeout(r, 600));
  window.print();
})();
</script>
</body>
</html>
