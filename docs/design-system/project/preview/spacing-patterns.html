<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><link rel="stylesheet" href="../colors_and_type.css"></head><body>
<div class="label-row"><span class="eyebrow">Surface patterns</span><span class="eyebrow" style="font-family:var(--font-mono);letter-spacing:0">blueprint · dots · workspace · glow</span></div>
<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px">
  <div style="height:90px;background:#0F0F0F;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:24px 24px;border-radius:10px;border:1px solid var(--line-1);display:flex;align-items:flex-end;padding:10px;font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">dark-blueprint-grid 24×24 · 3%</div>
  <div style="height:90px;background:#0F0F0F;background-image:radial-gradient(rgba(255,255,255,.06) 1px,transparent 1px);background-size:20px 20px;border-radius:10px;border:1px solid var(--line-1);display:flex;align-items:flex-end;padding:10px;font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">dark-dot-grid 20×20 · 6%</div>
  <div style="height:90px;background:#0A0A0A;background-image:radial-gradient(rgba(255,255,255,.08) 1px,transparent 1px);background-size:24px 24px;border-radius:10px;border:1px solid var(--line-1);display:flex;align-items:flex-end;padding:10px;font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">workspace-canvas-bg · #0A0A0A</div>
  <div style="height:90px;background:radial-gradient(ellipse at center,rgba(249,115,22,.12) 0%,transparent 70%),#0F0F0F;border-radius:10px;border:1px solid var(--line-1);display:flex;align-items:flex-end;padding:10px;font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">section-glow · orange 4% ellipse</div>
</div>
</body></html>
