<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><link rel="stylesheet" href="../colors_and_type.css"></head><body>
<div class="label-row"><span class="eyebrow">Buttons · Variants</span><span class="eyebrow" style="font-family:var(--font-mono);letter-spacing:0">primary · secondary · outline · ghost · link</span></div>
<div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center">
  <button style="background:#F97316;color:#fff;border:1px solid #EA580C;border-radius:10px;padding:10px 20px;font-family:var(--font-ui);font-size:14px;font-weight:500;box-shadow:0 8px 24px rgba(249,115,22,.25);display:inline-flex;gap:8px;align-items:center;cursor:pointer">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    New Project
  </button>
  <button style="background:#1a1a1a;color:rgba(255,255,255,.9);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:10px 20px;font-family:var(--font-ui);font-size:14px;font-weight:500">Secondary</button>
  <button style="background:transparent;color:rgba(255,255,255,.9);border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:10px 20px;font-family:var(--font-ui);font-size:14px;font-weight:500">Outline</button>
  <button style="background:transparent;color:rgba(255,255,255,.7);border:1px solid transparent;border-radius:10px;padding:10px 20px;font-family:var(--font-ui);font-size:14px;font-weight:500">Ghost</button>
  <a style="color:#F97316;text-decoration:underline;text-underline-offset:4px;font-family:var(--font-ui);font-size:14px;font-weight:500">Link style</a>
</div>
<div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:12px">
  <button style="background:#F97316;color:#fff;border:1px solid #EA580C;border-radius:8px;padding:6px 14px;font-family:var(--font-ui);font-size:12px;font-weight:500">Small</button>
  <button style="background:#F97316;color:#fff;border:1px solid #EA580C;border-radius:10px;padding:12px 28px;font-family:var(--font-ui);font-size:15px;font-weight:500">Large</button>
  <button style="background:#F97316;color:#fff;border:1px solid #EA580C;border-radius:10px;width:40px;height:40px;display:inline-flex;align-items:center;justify-content:center"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
  <button disabled style="background:#F97316;color:#fff;border:1px solid #EA580C;border-radius:10px;padding:10px 20px;font-family:var(--font-ui);font-size:14px;font-weight:500;opacity:.5;cursor:not-allowed">Disabled</button>
</div>
</body></html>
